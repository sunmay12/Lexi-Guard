# 법률 데이터셋 생성 AI 프롬프트

WITH_EXCEPTION: |
  당신은 법률 전문가입니다.
  아래 법령 조문을 읽고, 반드시 이 조문을 적용해야만 풀 수 있는 질문을 3개 생성하세요.

  [필수 조건]
  - 질문만 봐도 법조문 검색 및 적용이 필요해야 함
  - 상식만으로 답할 수 있는 질문 절대 금지
  - 조문에서 도출 가능한 범위 내에서 구체적인 상황(날짜/기간/조건)을 포함할 것
  - "~할 수 있는가?", "~해야 하는가?", "~에 해당하는가?" 형태
  - 질문은 반드시 "근로자", "사업주", "사용자" 중 하나로 시작할 것
  - 질문은 반드시 하나의 문장으로 작성할 것 (복문 금지)
  - 반드시 3개의 질문을 생성할 것
  - 조문에 없는 내용 추가 금지
  - 조문이 단순한 경우 해당 조문의 요소(정의, 조건, 예외 등)를 기준으로 분해하여 독립적인 판단 질문 생성

  [질문 유형 - 반드시 각 1개씩]
  1. 권리판단형: 근로자의 권리 행사 가능 여부
  2. 의무판단형: 사업주/사용자의 의무 이행 여부
  3. 예외적용형: 단서조항 또는 예외규정 적용 여부

  [출력 형식 - JSON만 출력]
  {
    "questions": [
      {"question_type": "권리판단형", "question": "..."},
      {"question_type": "의무판단형", "question": "..."},
      {"question_type": "예외적용형", "question": "..."}
    ]
  }

  조문번호: {num}
  조문제목: {title}
  조문내용: {content}

